<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Évaluez votre risque de cancer cutané</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      padding: 2rem 1rem;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* Shell fixe 800px */
    #app {
      width: 100%;
      max-width: 660px;
      height: 700px;
      background: #ffffff;
      border-radius: 16px;
      border: 0.5px solid rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* En-tête fixe */
    .app-header {
      padding: 1.5rem 1.75rem 1rem;
      flex-shrink: 0;
      border-bottom: 0.5px solid rgba(0,0,0,0.07);
    }
    h1 { font-size: 18px; font-weight: 500; color: #1a1a18; margin-bottom: 0.2rem; }
    .subtitle { font-size: 13px; color: #6b6b68; line-height: 1.5; margin-bottom: 1rem; }
    .progress-bar { height: 3px; background: rgba(0,0,0,0.08); border-radius: 2px; margin-bottom: 0.4rem; }
    .progress-fill { height: 100%; border-radius: 2px; background: #378ADD; transition: width 0.4s ease; }
    .step-label { font-size: 11px; color: #9b9b97; letter-spacing: 0.02em; }

    /* Zone scrollable */
    .app-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.75rem;
    }
    .app-body::-webkit-scrollbar { width: 4px; }
    .app-body::-webkit-scrollbar-track { background: transparent; }
    .app-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

    /* Pied de page fixe */
    .app-footer {
      padding: 1rem 1.75rem;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      flex-shrink: 0;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* Typographie */
    .section-title {
      font-size: 14px; font-weight: 500; color: #1a1a18;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
    }

    /* Phototype grid */
    .phototype-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .pt-card {
      padding: 10px; border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 10px; cursor: pointer; transition: all 0.15s;
    }
    .pt-card:hover { border-color: rgba(0,0,0,0.25); background: #f5f5f3; }
    .pt-card.selected { border-color: #378ADD; background: #E6F1FB; }
    .pt-swatch { width: 24px; height: 24px; border-radius: 50%; margin-bottom: 6px; border: 0.5px solid rgba(0,0,0,0.12); }
    .pt-num { font-size: 13px; font-weight: 500; color: #1a1a18; margin-bottom: 3px; }
    .pt-desc { font-size: 11px; color: #6b6b68; line-height: 1.35; }
    .pt-card.selected .pt-num { color: #0C447C; }
    .pt-card.selected .pt-desc { color: #185FA5; }

    /* Questions */
    .question { margin-bottom: 1rem; }
    .q-text { font-size: 13px; color: #1a1a18; margin-bottom: 0.4rem; line-height: 1.5; }
    .options { display: flex; flex-wrap: wrap; gap: 7px; }
    .opt-btn {
      font-size: 12px; padding: 5px 13px;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 7px;
      background: #ffffff; color: #1a1a18;
      cursor: pointer; transition: all 0.15s;
    }
    .opt-btn:hover { background: #f5f5f3; }
    .opt-btn.selected { background: #E6F1FB; border-color: #378ADD; color: #0C447C; }

    /* Boutons nav */
    .btn-next {
      padding: 9px 22px; background: #378ADD; color: white;
      border: none; border-radius: 8px; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: background 0.15s;
    }
    .btn-next:hover { background: #185FA5; }
    .btn-next:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-back {
      padding: 9px 18px; background: transparent; color: #6b6b68;
      border: 0.5px solid rgba(0,0,0,0.18); border-radius: 8px;
      font-size: 13px; cursor: pointer; transition: background 0.15s;
    }
    .btn-back:hover { background: #f5f5f3; }

    /* Dots */
    .step-dots { display: flex; gap: 5px; margin-left: auto; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(0,0,0,0.12); transition: background 0.3s; }
    .dot.active { background: #378ADD; }
    .dot.done   { background: #A8CFEE; }

    /* Résultats */
    .result-card { border: 0.5px solid rgba(0,0,0,0.09); border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem; }
    .risk-badge { display: inline-block; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 6px; margin-bottom: 0.6rem; }
    .risk-tres-eleve  { background: #FCEBEB; color: #791F1F; }
    .risk-eleve       { background: #FAEEDA; color: #633806; }
    .risk-modere      { background: #FEF6DC; color: #7A5000; }
    .risk-faible      { background: #EAF3DE; color: #3B6D11; }
    .risk-tres-faible { background: #EAF3DE; color: #27500A; }
    .result-title { font-size: 14px; font-weight: 500; margin-bottom: 0.4rem; color: #1a1a18; }
    .result-body  { font-size: 13px; color: #6b6b68; line-height: 1.55; }
    .factors-list { margin-top: 0.5rem; padding-left: 1.1rem; }
    .factors-list li { font-size: 12px; color: #6b6b68; margin-bottom: 3px; line-height: 1.45; }
    .cta-box { background: #f5f5f3; border-radius: 10px; padding: 0.85rem 1rem; margin-top: 0.75rem; }
    .cta-title { font-size: 13px; font-weight: 500; color: #1a1a18; margin-bottom: 0.3rem; }
    .cta-text  { font-size: 12px; color: #6b6b68; line-height: 1.55; }
    .warning   { font-size: 11px; color: #9b9b97; font-style: italic; line-height: 1.5; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 0.5px solid rgba(0,0,0,0.07); }

    @media (max-width: 520px) {
      body { padding: 0; }
      #app { height: 100vh; border-radius: 0; }
      .phototype-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="app-header">
    <h1>Évaluez votre risque de cancer cutané</h1>
    <p class="subtitle">Questionnaire d'autoévaluation — ne remplace pas un avis médical.</p>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:25%"></div></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:0.4rem;">
      <span class="step-label" id="step-label">Étape 1 sur 4</span>
      <div class="step-dots">
        <div class="dot active" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
        <div class="dot" id="d4"></div>
      </div>
    </div>
  </div>

  <div class="app-body" id="step-content"></div>
  <div class="app-footer" id="app-footer"></div>
</div>

<script>
const state = { phototype: null, q: {} };

const phototypes = [
  { num:1, label:"Type I",   swatch:"#FDE8D8", desc:"Peau très claire, taches de rousseur. Brûle toujours, ne bronze jamais." },
  { num:2, label:"Type II",  swatch:"#F5CEAE", desc:"Peau claire, cheveux blonds/châtain clair. Brûle facilement, bronze peu." },
  { num:3, label:"Type III", swatch:"#E8B88A", desc:"Peau intermédiaire. Brûle parfois, bronze progressivement." },
  { num:4, label:"Type IV",  swatch:"#C9935A", desc:"Peau mate. Brûle rarement, bronze facilement." },
  { num:5, label:"Type V",   swatch:"#8B5E3C", desc:"Peau brune foncée. Brûle très rarement, bronze toujours." },
  { num:6, label:"Type VI",  swatch:"#4A2F1E", desc:"Peau noire. Ne brûle presque jamais." },
];

const qExpo = [
  { id:"sunburns",    label:"Avez-vous souvent eu de sérieux coups de soleil avant l'âge de 18 ans ?", opts:["Oui","Non","Ne sais pas"] },
  { id:"vacances",    label:"Êtes-vous régulièrement exposé(e) à un rayonnement solaire intense pendant vos vacances ?", opts:["Oui","Non"] },
  { id:"pro_loisirs", label:"Êtes-vous exposé(e) au soleil de façon prolongée lors de votre activité professionnelle ou de vos loisirs (sport, jardinage, travaux extérieurs…) ?", opts:["Oui","Non"] },
  { id:"solarium",    label:"Fréquentez-vous les cabines de bronzage (solarium) ?", opts:["Oui","Non"] },
];

const qMedical = [
  { id:"melanome_famille", label:"Des membres de votre famille proche (parents, fratrie) ont-ils été atteints de mélanome ?", opts:["Oui","Non","Ne sais pas"] },
  { id:"antecedent_perso", label:"Avez-vous vous-même des antécédents personnels de cancer de la peau ?", opts:["Oui","Non","Ne sais pas"] },
  { id:"naevi",            label:"Avez-vous de nombreux grains de beauté (plus de 50) ou des grains de beauté d'aspect irrégulier, multicolore ou de grande taille ?", opts:["Oui","Non","Ne sais pas"] },
  { id:"immuno",           label:"Êtes-vous sous traitement immunosuppresseur ou avez-vous un système immunitaire affaibli ?", opts:["Oui","Non","Ne sais pas"] },
];

function setProgress(pct, stepText, activeDot) {
  document.getElementById("progress").style.width = pct + "%";
  document.getElementById("step-label").textContent = stepText;
  [1,2,3,4].forEach(i => {
    const d = document.getElementById("d"+i);
    d.className = "dot" + (i < activeDot ? " done" : i === activeDot ? " active" : "");
  });
}
function setFooter(html) { document.getElementById("app-footer").innerHTML = html; }
function scrollTop() { document.getElementById("step-content").scrollTop = 0; }
function allAnswered(list) { return list.every(q => state.q[q.id]); }

/* ── Étape 1 ── */
function renderStep1() {
  setProgress(25, "Étape 1 sur 4 — Votre phototype", 1);
  let html = `<div class="section-title">Déterminez votre phototype</div>
  <p style="font-size:13px;color:#6b6b68;margin-bottom:0.85rem;line-height:1.5;">Choisissez le profil correspondant à votre peau naturelle (sans bronzage) :</p>
  <div class="phototype-grid">`;
  phototypes.forEach(pt => {
    const sel = state.phototype === pt.num ? "selected" : "";
    html += `<div class="pt-card ${sel}" onclick="selectPhototype(${pt.num})">
      <div class="pt-swatch" style="background:${pt.swatch}"></div>
      <div class="pt-num">${pt.label}</div>
      <div class="pt-desc">${pt.desc}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById("step-content").innerHTML = html;
  setFooter(`<button class="btn-next" id="btn1" onclick="goStep2()" ${state.phototype ? "" : "disabled"}>Continuer →</button>`);
  scrollTop();
}

function selectPhototype(n) {
  state.phototype = n;
  document.querySelectorAll(".pt-card").forEach((c, i) => c.classList.toggle("selected", phototypes[i].num === n));
  document.getElementById("btn1").disabled = false;
}

/* ── Étape 2 ── */
function renderStep2() {
  setProgress(50, "Étape 2 sur 4 — Exposition solaire", 2);
  let html = `<div class="section-title">Votre exposition aux UV</div>`;
  qExpo.forEach(q => {
    const cur = state.q[q.id];
    html += `<div class="question"><div class="q-text">${q.label}</div><div class="options">`;
    q.opts.forEach(o => {
      html += `<button class="opt-btn ${cur===o?"selected":""}" onclick="selectQ('${q.id}','${o}',this,'btn2')">${o}</button>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("step-content").innerHTML = html;
  setFooter(`
    <button class="btn-back" onclick="goStep1()">← Retour</button>
    <button class="btn-next" id="btn2" onclick="goStep3()" ${allAnswered(qExpo)?"":"disabled"}>Continuer →</button>
  `);
  scrollTop();
}

/* ── Étape 3 ── */
function renderStep3() {
  setProgress(75, "Étape 3 sur 4 — Antécédents médicaux", 3);
  let html = `<div class="section-title">Vos antécédents et facteurs médicaux</div>`;
  qMedical.forEach(q => {
    const cur = state.q[q.id];
    html += `<div class="question"><div class="q-text">${q.label}</div><div class="options">`;
    q.opts.forEach(o => {
      html += `<button class="opt-btn ${cur===o?"selected":""}" onclick="selectQ('${q.id}','${o}',this,'btn3')">${o}</button>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("step-content").innerHTML = html;
  setFooter(`
    <button class="btn-back" onclick="goStep2()">← Retour</button>
    <button class="btn-next" id="btn3" onclick="goStep4()" ${allAnswered(qMedical)?"":"disabled"}>Voir mon résultat →</button>
  `);
  scrollTop();
}

function selectQ(id, val, btn, btnId) {
  state.q[id] = val;
  btn.closest(".options").querySelectorAll(".opt-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  const list = btnId === "btn2" ? qExpo : qMedical;
  if (allAnswered(list)) document.getElementById(btnId).disabled = false;
}

/* ── Étape 4 ── */
function computeRisk() {
  const pt = state.phototype, q = state.q;
  let s = 0;
  if (pt===1) s+=4; else if (pt===2) s+=3; else if (pt===3) s+=2; else if (pt===4) s+=1;
  if (q.sunburns==="Oui")         s+=2;
  if (q.vacances==="Oui")         s+=1;
  if (q.pro_loisirs==="Oui")      s+=1;
  if (q.solarium==="Oui")         s+=2;
  if (q.melanome_famille==="Oui") s+=2;
  if (q.antecedent_perso==="Oui") s+=3;
  if (q.naevi==="Oui")            s+=2;
  if (q.immuno==="Oui")           s+=2;
  return s;
}

function renderStep4() {
  setProgress(100, "Étape 4 sur 4 — Résultats", 4);
  const pt = state.phototype, score = computeRisk();
  const ptInfo = phototypes.find(p => p.num === pt);

  let ptRisk, ptClass;
  if (pt<=2)      { ptRisk="très élevé";  ptClass="risk-tres-eleve"; }
  else if (pt===3){ ptRisk="élevé";       ptClass="risk-eleve"; }
  else if (pt===4){ ptRisk="modéré";      ptClass="risk-modere"; }
  else if (pt===5){ ptRisk="faible";      ptClass="risk-faible"; }
  else            { ptRisk="très faible"; ptClass="risk-tres-faible"; }

  let gRisk, gClass, cta;
  if (score>=10)      { gRisk="Risque global très élevé"; gClass="risk-tres-eleve"; cta="Une consultation dermatologique est fortement recommandée. Signalez vos antécédents et vos grains de beauté à votre médecin."; }
  else if (score>=7)  { gRisk="Risque global élevé";      gClass="risk-eleve";      cta="Un bilan dermatologique annuel est conseillé. Appliquez rigoureusement les mesures de prévention."; }
  else if (score>=4)  { gRisk="Risque global modéré";     gClass="risk-modere";     cta="Adoptez de bonnes pratiques de protection solaire. En cas de doute sur un grain de beauté, consultez un dermatologue."; }
  else                { gRisk="Risque global faible";     gClass="risk-faible";     cta="Votre risque est actuellement limité. Maintenez de bonnes habitudes de protection solaire et évitez les coups de soleil."; }

  const facs = [];
  if (state.q.sunburns==="Oui")         facs.push("Coups de soleil sévères avant 18 ans");
  if (state.q.vacances==="Oui")         facs.push("Exposition solaire intense en vacances");
  if (state.q.pro_loisirs==="Oui")      facs.push("Exposition professionnelle ou lors de loisirs");
  if (state.q.solarium==="Oui")         facs.push("Usage de cabines de bronzage");
  if (state.q.melanome_famille==="Oui") facs.push("Antécédent familial de mélanome");
  if (state.q.antecedent_perso==="Oui") facs.push("Antécédent personnel de cancer cutané");
  if (state.q.naevi==="Oui")            facs.push("Nombreux grains de beauté ou nævus atypiques");
  if (state.q.immuno==="Oui")           facs.push("Immunodépression");

  let html = `<div class="section-title">Résultats de votre évaluation</div>
  <div class="result-card">
    <span class="risk-badge ${ptClass}">Phototype ${pt}</span>
    <div class="result-title">Peau de type ${pt} — risque lié au phototype : <strong>${ptRisk}</strong></div>
    <div class="result-body">${ptInfo.desc}</div>
  </div>
  <div class="result-card">
    <span class="risk-badge ${gClass}">${gRisk}</span>
    <div class="result-title">Évaluation globale (phototype + facteurs de risque)</div>`;

  if (facs.length > 0) {
    html += `<div class="result-body">Vous présentez ${facs.length} facteur(s) de risque identifié(s) :</div><ul class="factors-list">`;
    facs.forEach(f => { html += `<li>${f}</li>`; });
    html += `</ul>`;
  } else {
    html += `<div class="result-body">Aucun facteur de risque comportemental ou médical identifié.</div>`;
  }

  html += `</div>
  <div class="cta-box">
    <div class="cta-title">Que faire ?</div>
    <div class="cta-text">${cta} Quelle que soit votre situation, évitez toute exposition prolongée sans protection (SPF adapté à votre phototype), surtout entre 12h et 16h.</div>
  </div>
  <p class="warning">Ce questionnaire est un outil d'information préventive. Il ne constitue pas un diagnostic médical. En cas de doute, consultez un professionnel de santé.</p>`;

  document.getElementById("step-content").innerHTML = html;
  setFooter(`<button class="btn-back" onclick="reset()">↺ Recommencer</button>`);
  scrollTop();
}

function goStep1() { renderStep1(); }
function goStep2() { renderStep2(); }
function goStep3() { renderStep3(); }
function goStep4() { renderStep4(); }
function reset()   { state.phototype = null; state.q = {}; renderStep1(); }

renderStep1();
</script>
</body>
</html>
